services:
  - type: web
    name: cookies-et-coquilettes-bff
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci && npm run build:bff
    startCommand: npm run start:bff:render
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: GENERATED_IMAGE_CACHE_DIR
        value: .cache/generated-images
      - key: GENERATED_IMAGE_BASE_URL
        sync: false
      # Modèles IA (optionnel — défaut : gpt-image-1.5/1-mini, gpt-4o-mini)
      - key: AI_IMAGE_MODEL_RECIPE
        sync: false
      - key: AI_IMAGE_MODEL_INGREDIENT
        sync: false
      - key: AI_IMAGE_MODEL_COOKING_STEP
        sync: false
      - key: AI_CHAT_MODEL
        sync: false

